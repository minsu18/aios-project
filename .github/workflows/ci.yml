# AIOS CI: build kernel, prototype, and run RPi simulation
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, llvm-tools, rust-src
          targets: aarch64-unknown-none

      - name: Install system deps (llvm, ALSA, V4L2)
        run: sudo apt-get update && sudo apt-get install -y llvm libasound2-dev libv4l-dev

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: aios-rust

      - name: Build workspace (excl. kernel-rpi: ARM-only, fails on host/tests)
        run: cargo build --workspace --exclude aios-kernel-rpi --all-targets

      - name: Build kernel-rpi (release)
        run: cargo build -p aios-kernel-rpi --target aarch64-unknown-none --release

  simulate:
    name: RPi simulation
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none

      - name: Install QEMU and llvm-objcopy
        run: sudo apt-get update && sudo apt-get install -y qemu-system-aarch64 llvm

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: aios-rust

      - name: Build kernel
        run: ./tools/build-rpi.sh

      - name: Run simulation (5s smoke test)
        run: timeout 5 ./tools/simulate-rpi.sh || true
        # QEMU exits with 0 on Ctrl+A X; timeout returns 124. Either indicates boot succeeded.

  prototype:
    name: Prototype build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: prototype/package-lock.json

      - name: Install dependencies
        working-directory: prototype
        run: npm ci

      - name: Build
        working-directory: prototype
        run: npm run build
