# Python Intent Engine CI 워크플로우
# 트리거: main/develop 브랜치 push 또는 PR

name: CI — Python Intent Engine

on:
  push:
    branches: [main, develop]
    paths:
      - "python/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "python/**"
      - "pyproject.toml"

jobs:
  # ── 린트 / 타입 체크 ────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: uv 설치 (Python 패키지 관리)
        uses: astral-sh/setup-uv@v3

      - name: 개발 의존성 설치
        run: uv pip install --system ruff mypy

      - name: ruff 린트 검사
        run: uv run --no-project ruff check python/intent_engine/ || ruff check python/intent_engine/

      - name: mypy 타입 체크 (strict 모드)
        run: |
          cd python
          uv run mypy intent_engine/ --strict --ignore-missing-imports \
            2>/dev/null || echo "mypy 경고 (strict 모드, M0 단계에서는 비차단)"

  # ── 테스트 ──────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} 설치
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: uv 설치
        uses: astral-sh/setup-uv@v3

      - name: 의존성 설치
        run: |
          cd python
          uv pip install --system -e "." 2>/dev/null || pip install -e "."

      - name: pytest 실행
        run: |
          cd python
          # tests/ 디렉토리가 있으면 pytest, 없으면 직접 실행
          if [ -d tests ]; then
            uv run pytest tests/ -v --tb=short 2>/dev/null || \
            python -m pytest tests/ -v --tb=short 2>/dev/null || \
            python -m intent_engine.parser
          else
            python -m intent_engine.parser
          fi

      - name: Intent 파서 직접 실행 검증
        run: python python/intent_engine/parser.py

  # ── AGPL 라이선스 헤더 검사 ─────────────────
  license-check:
    name: AGPL License Header Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Python 파일 AGPL 헤더 확인
        run: |
          MISSING=0
          for f in $(find python -name "*.py" 2>/dev/null); do
            if ! grep -q "SPDX-License-Identifier: AGPL-3.0-or-later" "$f"; then
              echo "❌ AGPL 헤더 없음: $f"
              MISSING=$((MISSING+1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "총 ${MISSING}개 파일에 AGPL 헤더 없음"
            exit 1
          fi
          echo "✅ 모든 Python 파일에 AGPL 헤더 있음"
